<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Image Gallery</title>
<style>
body {font-family: Arial; margin:0; background:#f4f4f4;}
h1{text-align:center; padding:20px;}

.filter-btns{
  text-align:center;
  margin-bottom:20px;
}
.filter-btns button{
  padding:10px 15px;
  margin:5px;
  border:none;
  background:#333;
  color:#fff;
  cursor:pointer;
  border-radius:5px;
}
.filter-btns button:hover{background:#555;}

.gallery{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:15px;
  padding:20px;
}
.gallery img{
  width:100%;
  cursor:pointer;
  border-radius:10px;
  transition:0.3s;
}
.gallery img:hover{transform:scale(1.05);}

.lightbox{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.9);
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

.lightbox img{
  width:60%;
  border-radius:10px;
  margin-bottom:20px;
}

.lightbox-buttons{
  display:flex;
  gap:15px;
}

.lightbox-buttons button{
  padding:10px 20px;
  border:none;
  background:#fff;
  cursor:pointer;
  border-radius:5px;
  font-size:16px;
}

.lightbox-buttons button:hover{
  background:#ddd;
}
</style>
</head>
<body>

<h1>Image Gallery</h1>

<div class="filter-btns">
  <button onclick="filterImages('all')">All</button>
  <button onclick="filterImages('nature')">Nature</button>
  <button onclick="filterImages('city')">City</button>
</div>

<div class="gallery">
  <img src="https://picsum.photos/400/300?1" class="nature" onclick="openLightbox(0)">
  <img src="https://picsum.photos/400/300?2" class="city" onclick="openLightbox(1)">
  <img src="https://picsum.photos/400/300?3" class="nature" onclick="openLightbox(2)">
  <img src="https://picsum.photos/400/300?4" class="city" onclick="openLightbox(3)">
</div>

<div class="lightbox" id="lightbox">
  <img id="lightbox-img">

  <div class="lightbox-buttons">
    <button onclick="prevImage()">Previous</button>
    <button onclick="nextImage()">Next</button>
    <button onclick="closeLightbox()">Close</button>
  </div>
</div>

<script>
let currentIndex = 0;
let images = document.querySelectorAll(".gallery img");

function openLightbox(index){
  currentIndex = index;
  document.getElementById("lightbox").style.display="flex";
  document.getElementById("lightbox-img").src=images[currentIndex].src;
}

function closeLightbox(){
  document.getElementById("lightbox").style.display="none";
}

function nextImage(){
  currentIndex = (currentIndex + 1) % images.length;
  document.getElementById("lightbox-img").src=images[currentIndex].src;
}

function prevImage(){
  currentIndex = (currentIndex - 1 + images.length) % images.length;
  document.getElementById("lightbox-img").src=images[currentIndex].src;
}

function filterImages(category){
  images.forEach(img=>{
    img.style.display=(category==="all" || img.classList.contains(category)) ? "block":"none";
  });
}


document.addEventListener("keydown", function(e){
  if(document.getElementById("lightbox").style.display==="flex"){
    if(e.key==="ArrowRight") nextImage();
    if(e.key==="ArrowLeft") prevImage();
    if(e.key==="Escape") closeLightbox();
  }
});
</script>

</body>
</html>
